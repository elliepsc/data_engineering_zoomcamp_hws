# ============================================
# Source Configuration
# ============================================
# Defines raw data sources from BigQuery

version: 2

sources:
  - name: raw_data
    description: Raw NYC taxi data loaded by Airflow
    database: "{{ env_var('GCP_PROJECT_ID') }}"
    schema: raw_data
    
    tables:
      - name: green_taxi
        description: Green taxi trip records (2019-2020)
        columns:
          - name: VendorID
            description: Provider ID (1=Creative Mobile, 2=VeriFone)
          - name: lpep_pickup_datetime
            description: Pickup timestamp
            tests:
              - not_null
          - name: lpep_dropoff_datetime
            description: Dropoff timestamp
            tests:
              - not_null
          - name: passenger_count
            description: Number of passengers
          - name: trip_distance
            description: Trip distance in miles
            tests:
              - not_null
          - name: PULocationID
            description: Pickup location ID
          - name: DOLocationID
            description: Dropoff location ID
          - name: fare_amount
            description: Base fare
          - name: total_amount
            description: Total amount charged
